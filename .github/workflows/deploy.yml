name: Deploy to PieHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip, mysql
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Remove dev files
        run: |
          rm -rf node_modules
          rm -rf .git .github
          rm -f .gitignore README.md .env.example

      - name: Prepare production .env
        run: |
          printf "APP_NAME=Multimarket\nAPP_ENV=production\nAPP_DEBUG=false\nAPP_URL=https://multimarket.in\nAPP_KEY=%s\nAPP_TIMEZONE=UTC\nDB_CONNECTION=mysql\nDB_HOST=127.0.0.1\nDB_PORT=3306\nDB_DATABASE=%s\nDB_USERNAME=%s\nDB_PASSWORD=%s\nSESSION_DRIVER=file\nCACHE_STORE=file\nQUEUE_CONNECTION=sync\nMAIL_MAILER=log\nLOG_CHANNEL=stack\nLOG_LEVEL=error\n" "${{ secrets.APP_KEY }}" "${{ secrets.DB_DATABASE }}" "${{ secrets.DB_USERNAME }}" "${{ secrets.DB_PASSWORD }}" > .env

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /public_html/
          exclude: |
            **/.git*/**
            **/.github/**
            **/node_modules/**
            .gitignore
            README.md
            .env.example
