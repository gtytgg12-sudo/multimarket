name: Deploy to PieHost

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, curl, zip, mysql
          coverage: none
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare production .env
        run: |
          cat > .env << EOF
          APP_NAME=Multimarket
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=https://multimarket.in
          APP_KEY=${{ secrets.APP_KEY }}
          APP_TIMEZONE=UTC
          DB_CONNECTION=mysql
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          SESSION_DRIVER=file
          CACHE_STORE=file
          QUEUE_CONNECTION=sync
          MAIL_MAILER=log
          LOG_CHANNEL=stack
          LOG_LEVEL=error
          VITE_APP_NAME="${{ secrets.APP_NAME }}"
          EOF

      - name: Upload via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            .git
            .github
            node_modules
            .gitignore
            README.md
            .env.example
